name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and Test (Ubuntu 24.04 / GCC 13)
    runs-on: ubuntu-24.04

    env:
      CC: gcc-13
      CXX: g++-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            gcc-13 \
            g++-13 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            ninja-build

      # Cache the FetchContent download directory so MuJoCo and other large
      # dependencies are not re-cloned on every run.
      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('workspace/cmake/deps.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      - name: CMake configure (Release)
        run: |
          cmake -B build -S workspace \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: |
          # Only run our project's tests (transforms_tests, pid_tests, etc.)
          # Eigen registers 900+ tests via FetchContent that we cannot suppress.
          # Use --tests-regex to match only our test executables.
          ctest --test-dir build --output-on-failure \
            --tests-regex "_tests" \
            --no-tests=ignore

  coverage:
    name: Coverage (Ubuntu 24.04 / GCC 13)
    runs-on: ubuntu-24.04

    env:
      CC: gcc-13
      CXX: g++-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake gcc-13 g++-13 lcov \
            libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev ninja-build

      - name: Cache FetchContent downloads (coverage)
        uses: actions/cache@v4
        with:
          path: build-cov/_deps
          key: fetchcontent-cov-${{ runner.os }}-${{ hashFiles('workspace/cmake/deps.cmake') }}
          restore-keys: |
            fetchcontent-cov-${{ runner.os }}-

      - name: CMake configure (Coverage)
        run: |
          cmake -B build-cov -S workspace \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_COVERAGE=ON \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build-cov -j$(nproc)

      - name: Run tests
        run: |
          ctest --test-dir build-cov --output-on-failure \
            --tests-regex "_tests" \
            --no-tests=ignore

      - name: Generate coverage report
        run: |
          lcov --directory build-cov \
               --capture \
               --output-file build-cov/coverage.info \
               --gcov-tool gcov-13 \
               --ignore-errors mismatch
          lcov --remove build-cov/coverage.info \
               '*/build-cov/_deps/*' '/usr/*' '*/tests/*' \
               --output-file build-cov/coverage_filtered.info \
               --ignore-errors unused
          genhtml build-cov/coverage_filtered.info \
               --output-directory build-cov/coverage_html \
               --title "TheRobotLibrary Coverage" \
               --legend --show-details

      - name: Check coverage threshold (>= 80%)
        run: |
          COVERAGE=$(lcov --summary build-cov/coverage_filtered.info 2>&1 \
            | grep "lines" | grep -oP '\d+\.\d+(?=%)' | head -1)
          echo "Line coverage: ${COVERAGE}%"
          python3 -c "
          import sys
          cov_str = '${COVERAGE}'
          if not cov_str:
              print('FAIL: Could not parse coverage percentage from lcov output')
              sys.exit(1)
          cov = float(cov_str)
          if cov < 80.0:
              print(f'FAIL: Coverage {cov:.1f}% is below 80% threshold')
              sys.exit(1)
          print(f'PASS: Coverage {cov:.1f}% meets 80% threshold')
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build-cov/coverage_html/
          retention-days: 30
