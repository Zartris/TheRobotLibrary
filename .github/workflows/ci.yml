name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and Test (Ubuntu 24.04 / GCC 13)
    runs-on: ubuntu-24.04

    env:
      CC: gcc-13
      CXX: g++-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            gcc-13 \
            g++-13 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            ninja-build

      # Cache the FetchContent download directory so MuJoCo and other large
      # dependencies are not re-cloned on every run.
      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('workspace/cmake/deps.cmake') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      - name: CMake configure (Release)
        run: |
          cmake -B build -S workspace \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
