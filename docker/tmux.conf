# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits (Terminator-style: o = horizontal/top-bottom, e = vertical/left-right) ──
unbind '"'
unbind %
bind o split-window -v -c "#{pane_current_path}"
bind e split-window -h -c "#{pane_current_path}"

# ── Pane navigation (prefix + arrow) ─────────────────────────────────────────
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# ── Mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on

# ── Terminal / colour ─────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── History ───────────────────────────────────────────────────────────────────
set -g history-limit 50000

# ── Indexing: start at 1, renumber on close ───────────────────────────────────
set  -g base-index       1
setw -g pane-base-index  1
set  -g renumber-windows on

# ── No ESC delay (important for vim / agents) ─────────────────────────────────
set -s escape-time 0

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-style                bg=colour235,fg=colour250
set -g status-left                 "#[fg=colour166,bold] ❖ #S #[fg=colour240]│ "
set -g status-right                "#[fg=colour240]%H:%M "
set -g status-left-length          30
set -g window-status-format        " #I:#W "
set -g window-status-current-format "#[fg=colour166,bold] #I:#W "
set -g window-status-current-style  fg=colour166,bold

# ── Show cheat sheet on new session (stays in scroll history) ─────────────────
set-hook -g session-created "send-keys 'trl-welcome' Enter"
