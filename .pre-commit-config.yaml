---
# pre-commit hook configuration for TheRobotLibrary
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
# Note: clang-tidy is intentionally excluded from pre-commit — it is too slow
# for a commit hook. Run it in CI via cmake -DCMAKE_CXX_CLANG_TIDY=clang-tidy.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        # Use the project's own .clang-format (located under workspace/)
        # clang-format searches parent directories, so this works for all
        # source files under workspace/.
        types_or: [c, c++]
        files: ^workspace/
        args: [--style=file]
